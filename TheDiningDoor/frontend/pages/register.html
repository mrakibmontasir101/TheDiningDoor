<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — The Dining Door</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { background: var(--light); }
    .reg-wrapper { min-height: 100vh; display: flex; flex-direction: column; }
    .reg-nav { background: var(--dark); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .reg-nav .logo { color: var(--orange); font-weight: 700; font-size: 1.2rem; text-decoration: none; }
    .reg-nav a { color: #94a3b8; text-decoration: none; font-size: 0.88rem; }
    .reg-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .reg-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); padding: 2.5rem; width: 100%; max-width: 520px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .reg-card h2 { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .reg-card .subtitle { color: var(--mid); font-size: 0.9rem; margin-bottom: 2rem; }
    .role-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.6rem; margin-bottom: 1.5rem; }
    .role-option { border: 2px solid var(--border); border-radius: 10px; padding: 1rem 0.5rem; text-align: center; cursor: pointer; transition: all .2s; }
    .role-option:hover { border-color: var(--orange); }
    .role-option.selected { border-color: var(--orange); background: #fff0eb; }
    .role-option .role-icon { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .role-option .role-name { font-size: 0.82rem; font-weight: 600; color: var(--dark); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    #ownerFields, #deliveryFields { display: none; }
  </style>
</head>
<body>
<div class="reg-wrapper">
  <div class="reg-nav">
    <a href="../index.html" class="logo">🍽 The Dining Door</a>
    <a href="login.html">Already have an account? Login</a>
  </div>

  <div class="reg-body">
    <div class="reg-card">
      <h2>Create your account</h2>
      <p class="subtitle">Choose your role to get started</p>

      <!-- Role Selection -->
      <div class="role-grid" id="roleGrid">
        <div class="role-option selected" onclick="selectRole('customer',this)">
          <div class="role-icon">🛍</div>
          <div class="role-name">Customer</div>
        </div>
        <div class="role-option" onclick="selectRole('owner',this)">
          <div class="role-icon">🍳</div>
          <div class="role-name">Restaurant Owner</div>
        </div>
        <div class="role-option" onclick="selectRole('delivery',this)">
          <div class="role-icon">🚴</div>
          <div class="role-name">Delivery</div>
        </div>
      </div>

      <div id="alert" class="alert" style="display:none"></div>

      <form id="regForm" onsubmit="handleRegister(event)">
        <!-- Common fields -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" placeholder="Minjun" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" placeholder="Kim" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" placeholder="010-0000-0000" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPass" placeholder="Repeat password" required>
          </div>
        </div>

        <!-- Owner-specific fields -->
        <div id="ownerFields">
          <div class="form-group">
            <label class="form-label">Restaurant Name</label>
            <input type="text" class="form-control" id="restaurantName" placeholder="Seoul BBQ">
          </div>
          <div class="form-group">
            <label class="form-label">Restaurant Address</label>
            <input type="text" class="form-control" id="restaurantAddr" placeholder="123 Dongshin-ro, Naju">
          </div>
          <div class="form-group">
            <label class="form-label">Business License Number</label>
            <input type="text" class="form-control" id="bizLicense" placeholder="000-00-00000">
          </div>
        </div>

        <!-- Delivery-specific fields -->
        <div id="deliveryFields">
          <div class="form-group">
            <label class="form-label">Vehicle Type</label>
            <select class="form-control" id="vehicleType">
              <option>Motorcycle</option>
              <option>Bicycle</option>
              <option>Electric Scooter</option>
              <option>Car</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="display:flex;align-items:flex-start;gap:0.6rem;margin-top:0.5rem">
          <input type="checkbox" id="terms" required style="margin-top:4px">
          <label for="terms" style="font-size:0.85rem;color:var(--mid)">
            I agree to the <a href="#" style="color:var(--orange)">Terms of Service</a> and
            <a href="#" style="color:var(--orange)">Privacy Policy</a> (PIPA compliant)
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;padding:0.7rem;font-size:1rem;border-radius:8px;margin-top:0.5rem">
          <span id="btnText">Create Account</span>
        </button>
      </form>
    </div>
  </div>
</div>

<script>
let selectedRole = 'customer';

function selectRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-option').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('ownerFields').style.display    = role === 'owner'    ? 'block' : 'none';
  document.getElementById('deliveryFields').style.display = role === 'delivery' ? 'block' : 'none';
  // Toggle required
  ['restaurantName','restaurantAddr','bizLicense'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.required = role === 'owner';
  });
}

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleRegister(e) {
  e.preventDefault();
  const pass    = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPass').value;
  if (pass !== confirm) { showAlert('Passwords do not match.', 'error'); return; }

  document.getElementById('btnText').innerHTML = '<span class="spinner"></span> Creating account...';

  const payload = {
    firstName:  document.getElementById('firstName').value,
    lastName:   document.getElementById('lastName').value,
    email:      document.getElementById('email').value,
    phone:      document.getElementById('phone').value,
    password:   pass,
    role:       selectedRole,
  };
  if (selectedRole === 'owner') {
    payload.restaurantName = document.getElementById('restaurantName').value;
    payload.restaurantAddr = document.getElementById('restaurantAddr').value;
    payload.bizLicense     = document.getElementById('bizLicense').value;
  }
  if (selectedRole === 'delivery') {
    payload.vehicleType = document.getElementById('vehicleType').value;
  }

  try {
    const res  = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'login.html', 1200);
    } else {
      showAlert(data.message || 'Registration failed.', 'error');
      document.getElementById('btnText').textContent = 'Create Account';
    }
  } catch {
    showAlert('Account created! Please login. (Demo mode — backend not connected)', 'success');
    setTimeout(() => window.location.href = 'login.html', 1500);
  }
}
</script>
</body>
</html>
