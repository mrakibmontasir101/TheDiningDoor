<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Restaurants — The Dining Door</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { background: var(--light); }
    .page-layout { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 60px); }
    /* Left panel */
    .left-panel { background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .search-bar { padding: 1rem; border-bottom: 1px solid var(--border); }
    .search-input-wrap { position: relative; }
    .search-input-wrap input { padding-left: 2.2rem; }
    .search-icon { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); color: var(--mid); }
    .cat-scroll { display: flex; gap: 0.5rem; overflow-x: auto; padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-pill { flex-shrink: 0; padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; border: 1.5px solid var(--border); color: var(--mid); cursor: pointer; transition: all .2s; background: var(--white); }
    .cat-pill.active { background: var(--orange); border-color: var(--orange); color: var(--white); }
    .restaurant-list { flex: 1; overflow-y: auto; padding: 0.8rem; display: flex; flex-direction: column; gap: 0.7rem; }
    .rest-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem; cursor: pointer; transition: all .2s; display: flex; gap: 0.8rem; align-items: flex-start; }
    .rest-card:hover, .rest-card.selected { border-color: var(--orange); box-shadow: 0 2px 12px rgba(255,107,53,0.15); }
    .rest-thumb { width: 64px; height: 64px; border-radius: 8px; background: #fff0eb; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
    .rest-info { flex: 1; min-width: 0; }
    .rest-info h4 { font-size: 0.95rem; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rest-info .rest-meta { font-size: 0.78rem; color: var(--mid); margin-bottom: 0.3rem; }
    .rest-info .rest-bottom { display: flex; align-items: center; justify-content: space-between; }
    .rest-info .rest-tags { display: flex; gap: 0.3rem; }
    /* Map area */
    .map-area { position: relative; background: #e8f4e8; }
    .map-area iframe { width: 100%; height: 100%; border: none; }
    .map-fallback { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--mid); }
    .map-fallback .map-big { font-size: 4rem; }
    /* Restaurant detail panel */
    .detail-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: var(--white); border-top-left-radius: 16px; border-top-right-radius: 16px; padding: 1.5rem; max-height: 55%; overflow-y: auto; transform: translateY(100%); transition: transform .35s ease; box-shadow: 0 -4px 24px rgba(0,0,0,0.12); }
    .detail-overlay.open { transform: translateY(0); }
    .detail-overlay .close-btn { position: absolute; top: 1rem; right: 1rem; background: var(--gray); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 1rem; }
    .detail-header { display: flex; gap: 1rem; align-items: flex-start; margin-bottom: 1rem; }
    .detail-thumb { width: 72px; height: 72px; border-radius: 10px; background: #fff0eb; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; flex-shrink: 0; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-top: 1rem; }
    .menu-item { background: var(--gray); border-radius: 8px; padding: 0.7rem; display: flex; justify-content: space-between; align-items: center; }
    .menu-item .item-info strong { font-size: 0.88rem; display: block; }
    .menu-item .item-info span { font-size: 0.75rem; color: var(--mid); }
    .menu-item .item-price { font-weight: 700; color: var(--orange); font-size: 0.9rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="logo">🍽 The Dining<span> Door</span></a>
  <ul class="nav-links">
    <li><a href="home.html" class="active">Restaurants</a></li>
    <li><a href="orders.html">My Orders</a></li>
    <li><a href="messages.html">Messages</a></li>
  </ul>
  <div class="nav-actions">
    <span id="userGreet" style="color:#94a3b8;font-size:0.85rem"></span>
    <a href="login.html" class="btn btn-outline btn-sm">Logout</a>
  </div>
</nav>

<div class="page-layout">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-control" id="searchInput" placeholder="Search restaurants..." oninput="filterRestaurants()">
      </div>
    </div>
    <div class="cat-scroll" id="catRow"></div>
    <div class="restaurant-list" id="restList"></div>
  </div>

  <!-- MAP AREA -->
  <div class="map-area" id="mapArea">
    <div class="map-fallback">
      <div class="map-big">🗺</div>
      <strong style="color:var(--dark);font-size:1.1rem">Interactive Map</strong>
      <p>Kakao / Google Maps API loads here.</p>
      <p style="font-size:0.8rem">Add your API key in <code>js/map.js</code></p>
      <div id="mapPins" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1rem;justify-content:center;max-width:400px"></div>
    </div>
    <!-- Restaurant detail overlay -->
    <div class="detail-overlay" id="detailPanel">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

<script>
// Load user
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (user.name) document.getElementById('userGreet').textContent = `Hi, ${user.name}`;

const categories = ['All','Korean','Japanese','Chinese','Pizza','Burgers','Dessert'];
const RESTAURANTS = [
  { id:1, name:'Mandu House',  cuisine:'Korean', distance:'1.2km', time:'20-30 min', rating:4.8, price:'₩₩', icon:'🥟', status:'open', kitchen:'Preparing', menu:[{name:'Kimchi Mandu',price:'₩9,000'},{name:'Beef Mandu',price:'₩11,000'},{name:'Soup Set',price:'₩13,000'},{name:'Fried Mandu',price:'₩8,000'}] },
  { id:2, name:'Seoul BBQ',    cuisine:'Korean', distance:'2.1km', time:'25-35 min', rating:4.5, price:'₩₩₩', icon:'🥩', status:'open', kitchen:'Idle', menu:[{name:'Beef BBQ Set',price:'₩18,000'},{name:'Pork Belly',price:'₩15,000'},{name:'Kimchi Jjigae',price:'₩9,000'},{name:'Seafood BBQ',price:'₩22,000'}] },
  { id:3, name:'Ramen Co.',    cuisine:'Japanese', distance:'0.8km', time:'15-25 min', rating:4.2, price:'₩₩', icon:'🍜', status:'open', kitchen:'Ready', menu:[{name:'Tonkotsu Ramen',price:'₩11,000'},{name:'Miso Ramen',price:'₩10,000'},{name:'Gyoza x5',price:'₩7,000'},{name:'Chashu Bowl',price:'₩12,000'}] },
  { id:4, name:'Pizza Bros',   cuisine:'Pizza',  distance:'3.2km', time:'30-45 min', rating:4.0, price:'₩₩', icon:'🍕', status:'open', kitchen:'Idle', menu:[{name:'Margherita',price:'₩14,000'},{name:'BBQ Chicken',price:'₩16,000'},{name:'Pepperoni',price:'₩15,000'},{name:'Cheese Dip',price:'₩3,000'}] },
  { id:5, name:'Sushi Park',   cuisine:'Japanese', distance:'1.8km', time:'20-30 min', rating:4.7, price:'₩₩₩', icon:'🍣', status:'open', kitchen:'Preparing', menu:[{name:'Salmon Sushi x8',price:'₩16,000'},{name:'Tuna Roll',price:'₩14,000'},{name:'Tempura Set',price:'₩18,000'},{name:'Edamame',price:'₩4,000'}] },
  { id:6, name:'Burger Barn',  cuisine:'Burgers', distance:'0.5km', time:'15-20 min', rating:3.9, price:'₩', icon:'🍔', status:'busy', kitchen:'Preparing', menu:[{name:'Classic Burger',price:'₩8,000'},{name:'Double Stack',price:'₩11,000'},{name:'Chicken Burger',price:'₩9,000'},{name:'Fries',price:'₩3,000'}] },
];

let activeCategory = 'All';
let filteredRests = [...RESTAURANTS];

// Render categories
const catRow = document.getElementById('catRow');
categories.forEach(c => {
  const el = document.createElement('div');
  el.className = 'cat-pill' + (c === 'All' ? ' active' : '');
  el.textContent = c;
  el.onclick = () => { activeCategory = c; document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active')); el.classList.add('active'); filterRestaurants(); };
  catRow.appendChild(el);
});

function filterRestaurants() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredRests = RESTAURANTS.filter(r =>
    (activeCategory === 'All' || r.cuisine === activeCategory) &&
    (r.name.toLowerCase().includes(q) || r.cuisine.toLowerCase().includes(q))
  );
  renderList();
  renderPins();
}

function renderList() {
  const list = document.getElementById('restList');
  list.innerHTML = filteredRests.length ? '' : '<p style="color:var(--mid);text-align:center;padding:2rem">No restaurants found.</p>';
  filteredRests.forEach(r => {
    const el = document.createElement('div');
    el.className = 'rest-card';
    el.id = `rc-${r.id}`;
    el.innerHTML = `
      <div class="rest-thumb">${r.icon}</div>
      <div class="rest-info">
        <h4>${r.name}</h4>
        <div class="rest-meta">${r.cuisine} · ${r.distance} · ${r.time}</div>
        <div class="rest-bottom">
          <span class="text-orange font-bold" style="font-size:0.85rem">⭐ ${r.rating}</span>
          <div class="rest-tags">
            <span class="badge ${r.status==='open'?'badge-green':'badge-red'}">${r.status==='open'?'Open':'Busy'}</span>
            <span class="badge badge-gray">${r.price}</span>
          </div>
        </div>
      </div>`;
    el.onclick = () => openDetail(r);
    list.appendChild(el);
  });
}

function renderPins() {
  const pins = document.getElementById('mapPins');
  pins.innerHTML = '';
  filteredRests.forEach(r => {
    const el = document.createElement('div');
    el.style.cssText = 'background:var(--dark);color:var(--orange);padding:0.3rem 0.8rem;border-radius:20px;font-size:0.8rem;cursor:pointer;border:1px solid #334155;';
    el.textContent = `${r.icon} ${r.name}`;
    el.onclick = () => openDetail(r);
    pins.appendChild(el);
  });
}

function openDetail(r) {
  document.querySelectorAll('.rest-card').forEach(c => c.classList.remove('selected'));
  const rc = document.getElementById(`rc-${r.id}`);
  if (rc) { rc.classList.add('selected'); rc.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  const kitchenColor = { Idle:'badge-gray', Preparing:'badge-orange', Ready:'badge-green' }[r.kitchen] || 'badge-gray';
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-header">
      <div class="detail-thumb">${r.icon}</div>
      <div>
        <h3>${r.name}</h3>
        <div style="color:var(--mid);font-size:0.85rem">${r.cuisine} · ${r.distance}</div>
        <div style="margin-top:0.4rem;display:flex;gap:0.5rem;flex-wrap:wrap">
          <span class="badge badge-orange">⭐ ${r.rating}</span>
          <span class="badge ${kitchenColor}">🔄 Kitchen: ${r.kitchen}</span>
          <span class="badge badge-gray">🕐 ${r.time}</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:0.6rem;margin-bottom:1rem;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="window.location.href='restaurant.html?id=${r.id}'">View Full Menu →</button>
      <button class="btn btn-gray btn-sm" onclick="window.location.href='messages.html?rest=${r.id}'">💬 Message</button>
    </div>
    <h4 style="font-size:0.9rem;margin-bottom:0.5rem">Menu Highlights</h4>
    <div class="menu-grid">
      ${r.menu.map(m => `
        <div class="menu-item">
          <div class="item-info"><strong>${m.name}</strong></div>
          <div class="item-price">${m.price}</div>
        </div>`).join('')}
    </div>`;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.rest-card').forEach(c => c.classList.remove('selected'));
}

filterRestaurants();
</script>
</body>
</html>
